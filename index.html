<!DOCTYPE html>
<html lang="ru">
<head>

    <style>
        * {

        body {

            z-index: 10;

        /* Скроллбары */

        .grid-list {
            display: grid;

        }
        .item-card {
            background: linear-gradient(145deg, #2d4d2d, #1f3a1f);

        .repair-btn { background: #e6c45f !important; color: #1f3a1f !important; box-shadow: 0 5px 0 #b38f40 !important; }
        
        .mode-btn {

        .back-btn {

        }

        .glass-panel {

            padding: 22px;
            margin: 20px 0;
            box-shadow: 0 15px 25px -8px black;
        }
        .trade-button {
            background: #7fb07f;
            border: none;            color: #112211;
            font-weight: bold;
            padding: 16px;
            border-radius: 50px;
            width: 100%;
            font-size: 18px;
            margin: 10px 0;
            cursor: pointer;
            box-shadow: 0 7px 0 #3d6b3d;

        .trade-button:active { transform: translateY(4px); box-shadow: 0 3px 0 #3d6b3d; }
        .trade-input {

            width: 100%;
            margin: 8px 0;
        }
        .message-box {
            background: #263f26;
            border: 2px solid #b0d6a0;
            border-radius: 28px;
            padding: 16px;
            margin: 10px 0;
            color: #eaffdc;
            font-weight: 500;
            word-break: break-word;
        }
        .profile-avatar { font-size: 72px; filter: drop-shadow(0 8px 6px #1f3a1f); display: block; margin: 0 auto; text-align: center;}
        .avatar-selector { display: flex; justify-content: center; gap: 10px; margin: 10px 0; }
        .avatar-option { font-size: 40px; cursor: pointer; padding: 5px; border-radius: 50%; transition: 0.2s; }
        .avatar-option.selected { background: #3b6e3b; border: 2px solid gold; }
        
        .achievement-badge {
            display: inline-block;
            background: #3b6e3b;
            border-radius: 40px;
            padding: 8px 15px;
            margin: 5px;
            border: 2px solid gold;
            font-weight: bold;
            font-size: 14px;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;            background: #1e3a1e;
            padding: 12px 20px;
            border-radius: 40px;
            margin: 8px 0;
            font-size: 16px;
        }
        .admin-row { display: flex; gap: 10px; margin: 10px 0; align-items: center; }
        .admin-row button { flex: 0 0 auto; padding: 8px 16px; font-size: 14px; }
        .banned { filter: grayscale(1); pointer-events: none; opacity: 0.6; }
        
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-3px); }
            100% { transform: translateX(0); }
        }
        .player-list-item {
            background: #1e3a1e;
            border-radius: 20px;
            padding: 10px;
            margin: 5px 0;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            border: 1px solid #5f9f5f;
        }
        .player-list-item:hover { background: #2b5a2b; }
        .daily-task-item {
            background: #1e3a1e;
            border-radius: 15px;
            padding: 12px;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #7fb07f;
        }
        .daily-task-item.completed { opacity: 0.6; background: #2a4a2a; }
        
        /* Загрузчик на случай долгой инициализации */
        #loader {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #8bc34a;
            font-size: 24px;
            font-weight: bold;
            display: none;
        }    </style>
</head>
<body>

<div id="loader">ЗАГРУЗКА...</div>
<div id="game"></div>
<div id="admin-panel"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    try {
        initGame();
    } catch (e) {
        console.error("Critical Error:", e);
        document.body.innerHTML = `<div style="color:red; padding:20px; text-align:center;"><h1>Ошибка загрузки</h1><p>${e.message}</p><button onclick="location.reload()" style="padding:10px;">Обновить</button></div>`;
    }
});

function initGame() {
    const gameDiv = document.getElementById('game');
    const adminDiv = document.getElementById('admin-panel');
    const loader = document.getElementById('loader');
    
    if(loader) loader.style.display = 'block';

    // ========== ПАРОЛЬ АДМИНА ==========
    const ADMIN_PASSWORD = '9260ai91';

    // ========== ПРОВЕРКА РЕЖИМА ==========
    const urlParams = new URLSearchParams(window.location.search);
    const isAdmin = urlParams.get('admin') === ADMIN_PASSWORD;

    // ========== КЛЮЧИ ХРАНЕНИЯ ==========
    const STORAGE_KEY = 'zgz_save';
    const ADMIN_STORAGE_KEY = 'zgz_admin';

    // ========== ДАННЫЕ ПО УМОЛЧАНИЮ ==========
    const DEFAULT_PLAYER = {
        id: '',
        name: 'Gin Zar',
        avatar: '🧟',
        money: 1000,
        rainbowMoney: 0,
        weapons: [{ name: 'Нож кухонный', durability: -1, skin: null }],
        units: [],
        zombieKills: {
            'Зомби-страх': 0, 'Зомби-силач': 0, 'Зомби-хакер': 0,
            'Зомби-невидимка': 0, 'Зомби-прыгун': 0, 'Зомби-скелет': 0, 'Big Zombie': 0
        },
        totalKills: 0,        level: 1,
        exp: 0,
        prestigeBonus: 0,
        maxWave: 0,
        usedPromos: [],
        promoBlockDonate: false,
        giftReceived: false,
        giftExpire: 0,
        achievements: [],
        dailyTasks: [],
        lastDailyReset: 0,
        lastDailyBonus: 0,
        playTime: 0,
        language: 'ru',
        renamedWeapons: {},
        isTester: false,
        isBanned: false
    };

    // ========== ЗАГРУЗКА ТЕКУЩЕГО ИГРОКА ==========
    let player = null;
    try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            const data = JSON.parse(saved);
            player = { ...DEFAULT_PLAYER, ...data };
            player.id = player.id || (Math.random().toString(36).substring(2, 10) + Date.now().toString(36));
            
            // Восстановление структур данных
            player.zombieKills = { ...DEFAULT_PLAYER.zombieKills, ...(data.zombieKills || {}) };
            player.usedPromos = Array.isArray(data.usedPromos) ? data.usedPromos : [];
            player.units = Array.isArray(data.units) ? data.units : [];
            player.achievements = Array.isArray(data.achievements) ? data.achievements : [];
            player.dailyTasks = Array.isArray(data.dailyTasks) ? data.dailyTasks : [];
            player.renamedWeapons = data.renamedWeapons || {};
            
            if (!Array.isArray(player.weapons)) player.weapons = [];
            player.weapons = player.weapons.map(w => {
                if (typeof w === 'string') return { name: w, durability: -1, skin: null };
                return { ...w, skin: w.skin || null };
            });
            if (!player.weapons.some(w => w.name === 'Нож кухонный')) {
                player.weapons.push({ name: 'Нож кухонный', durability: -1, skin: null });
            }
        } else {
            player = JSON.parse(JSON.stringify(DEFAULT_PLAYER));
            player.id = Math.random().toString(36).substring(2, 10) + Date.now().toString(36);
        }
    } catch (e) {
        console.warn("Save file corrupted, resetting...", e);        player = JSON.parse(JSON.stringify(DEFAULT_PLAYER));
        player.id = Math.random().toString(36).substring(2, 10) + Date.now().toString(36);
    }

    // ========== АДМИН-ДАННЫЕ ==========
    let adminData = { bannedIds: [], testers: [] };
    try {
        const savedAdmin = localStorage.getItem(ADMIN_STORAGE_KEY);
        if (savedAdmin) adminData = JSON.parse(savedAdmin);
    } catch (e) {}

    function saveAdmin() {
        try { localStorage.setItem(ADMIN_STORAGE_KEY, JSON.stringify(adminData)); } catch(e){}
    }

    // Синхронизация с админ-данными
    if (adminData.bannedIds.includes(player.id)) {
        player.isBanned = true;
    } else {
        player.isBanned = false;
    }
    player.isTester = adminData.testers.includes(player.id);

    function updateTesterWeapon() {
        if (player.isTester) {
            if (!player.weapons.some(w => w.name === 'Молот тестера')) {
                player.weapons.push({ name: 'Молот тестера', durability: -1, skin: null });
            }
        } else {
            player.weapons = player.weapons.filter(w => w.name !== 'Молот тестера');
        }
    }
    updateTesterWeapon();

    function savePlayer() {
        player.playTime += 1;
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(player)); } catch(e){}
    }

    setInterval(savePlayer, 2000);
    window.addEventListener('beforeunload', savePlayer);

    // ========== КОНСТАНТЫ ИГРЫ ==========
    const WEAPONS = [
        { name: 'Нож кухонный', priceZ: 0, priceR: 0, damage: 10, maxDur: -1, limited: false, cd: 1000 },
        { name: 'Мачете', priceZ: 300, priceR: 0, damage: 50, maxDur: 100, limited: false, cd: 3000 },
        { name: 'Топор', priceZ: 1000, priceR: 0, damage: 100, maxDur: 150, limited: false, cd: 2000 },
        { name: 'Пистолет глок', priceZ: 5000, priceR: 0, damage: 500, maxDur: 200, limited: false, cd: 2000 },
        { name: 'Пистолет дигл', priceZ: 8000, priceR: 0, damage: 600, maxDur: 250, limited: false, cd: 3000 },
        { name: 'Автомат Калашникова', priceZ: 16000, priceR: 0, damage: 900, maxDur: 300, limited: false, cd: 2000 },        { name: 'Сюрикены', priceZ: 30000, priceR: 0, damage: 1300, maxDur: 350, limited: false, cd: 1000 },
        { name: 'Дробовик', priceZ: 50000, priceR: 0, damage: 3000, maxDur: 200, limited: false, cd: 2000 },
        { name: 'Пулемёт', priceZ: 80000, priceR: 0, damage: 5000, maxDur: 400, limited: false, cd: 2000 },
        { name: 'РПГ', priceZ: 1200000, priceR: 0, damage: 20000, maxDur: 500, limited: false, cd: 3000 },
        { name: 'Миниган', priceZ: 1650000, priceR: 0, damage: 25000, maxDur: 12000, limited: false, cd: 2000 },
        { name: 'Невидимые сюрикены', priceZ: 1850000, priceR: 0, damage: 28000, maxDur: 15500, limited: false, cd: 2000 },
        { name: 'дубина', priceZ: 1200, priceR: 0, damage: 450, maxDur: 180, limited: false, cd: 2000 },
        { name: 'копьё', priceZ: 2500, priceR: 0, damage: 650, maxDur: 200, limited: false, cd: 3000 },
        { name: 'бумеранг', priceZ: 1000, priceR: 0, damage: 350, maxDur: 100, limited: false, cd: 5000 },
        { name: 'лук', priceZ: 500, priceR: 0, damage: 150, maxDur: 95, limited: false, cd: 1000 },
        { name: 'Меч', priceZ: 850, priceR: 0, damage: 200, maxDur: 125, limited: false, cd: 2000 },
        { name: 'кинжал', priceZ: 2000, priceR: 0, damage: 1200, maxDur: 300, limited: false, cd: 3000 },
        { name: 'булава', priceZ: 950, priceR: 0, damage: 450, maxDur: 150, limited: false, cd: 2000 },
        { name: 'серп', priceZ: 1850, priceR: 0, damage: 750, maxDur: 165, limited: false, cd: 3000 },
        { name: 'Радужный дробовик', priceZ: 0, priceR: 100, damage: 35000, maxDur: 25000, limited: true, cd: 2000 },
        { name: 'Драконий меч', priceZ: 0, priceR: 150, damage: 25000, maxDur: 30000, limited: true, cd: 3000 },
        { name: 'Меч молнии', priceZ: 0, priceR: 185, damage: 100000, maxDur: 65000, limited: true, cd: 3000 },
        { name: 'Смертельный цветок', priceZ: 0, priceR: 0, damage: 2500, maxDur: 8888, limited: false, cd: 2000 },
        { name: 'Конфетный меч', priceZ: 0, priceR: 0, damage: 161616, maxDur: -1, limited: false, cd: 2000 },
    ];

    const TESTER_HAMMER = { name: 'Молот тестера', damage: 999999, maxDur: -1, cd: 0 };

    const ZOMBIES = [
        { name: 'Зомби-страх', hp: 100, dmg: 30, reward: 10 },
        { name: 'Зомби-силач', hp: 500, dmg: 100, reward: 30 },
        { name: 'Зомби-хакер', hp: 1000, dmg: 300, reward: 65 },
        { name: 'Зомби-невидимка', hp: 5000, dmg: 1000, reward: 100 },
        { name: 'Зомби-прыгун', hp: 8000, dmg: 1200, reward: 500 },
        { name: 'Зомби-скелет', hp: 10000, dmg: 1800, reward: 850 },
        { name: 'Big Zombie', hp: 100000, dmg: 5000, reward: 1000 }
    ];

    const UNITS = [
        { name: 'Инженер', priceZ: 100000, priceR: 0, desc: 'Чинит оружие раз в минуту' },
        { name: 'Саня механик', priceZ: 0, priceR: 100, desc: 'Чинит + урон 1000' }
    ];

    const PROMOS = {
        'KWLX927': { type: 'money', val: 5000 },
        'LSKBAOW': { type: 'money', val: 11111 },
        'MAGXWZ': { type: 'money', val: 30000 },
        'XGWWDK': { type: 'money', val: 88888 },
        'KQVDEW': { type: 'weapon', val: 'Пулемёт' },
        'KWHDBN': { type: 'weapon', val: 'Дробовик' },
        'KEBWL826': { type: 'weapon', val: 'Радужный дробовик' },
        'KEYCB836$#': { type: 'rainbow', val: 100 },
        'JDG82HSJ': { type: 'rainbow', val: 500 }
    };
    // ========== ДОСТИЖЕНИЯ ==========
    const ACHIEVEMENTS = {
        kill100: { name: '100 убийств', condition: p => p.totalKills >= 100 },
        kill500: { name: '500 убийств', condition: p => p.totalKills >= 500 },
        kill1000: { name: '1000 убийств', condition: p => p.totalKills >= 1000 },
        wave50: { name: '50 волн', condition: p => p.maxWave >= 50 },
        wave100: { name: '100 волн', condition: p => p.maxWave >= 100 },
        wave500: { name: '500 волн', condition: p => p.maxWave >= 500 },
        wave1000: { name: 'Бесконечность не предел', condition: p => p.maxWave >= 1000 },
        weapons5: { name: '5 видов оружия', condition: p => p.weapons.length >= 5 },
        weapons10: { name: '10 видов оружия', condition: p => p.weapons.length >= 10 },
        allweapons: { name: 'Совершенный', condition: p => WEAPONS.every(w => p.weapons.some(pw => pw.name === w.name) || w.name === 'Нож кухонный') },
        allunits: { name: 'Властелин юнитов', condition: p => UNITS.every(u => p.units.includes(u.name)) },
        prestige1: { name: 'Первый престиж', condition: p => p.prestigeBonus >= 1 },
        prestige5: { name: 'Престиж 5', condition: p => p.prestigeBonus >= 5 },
        prestige10: { name: 'Престиж 10', condition: p => p.prestigeBonus >= 10 }
    };

    function checkAchievements() {
        const newAch = [];
        Object.entries(ACHIEVEMENTS).forEach(([id, ach]) => {
            if (!player.achievements.includes(id) && ach.condition(player)) {
                player.achievements.push(id);
                newAch.push(ach.name);
            }
        });
        if (newAch.length > 0) {
            player.rainbowMoney += newAch.length * 10;
            savePlayer();
            // Используем setTimeout чтобы не блокировать рендер
            setTimeout(() => alert(`🏅 Новые достижения: ${newAch.join(', ')}`), 100);
        }
    }

    // ========== ЕЖЕДНЕВНЫЕ ЗАДАНИЯ ==========
    const DAILY_TASKS = [
        { id: 'kill20', desc: 'Убить 20 зомби', target: 20, type: 'kill', reward: 5000 },
        { id: 'earn500', desc: 'Заработать 500 монет', target: 500, type: 'money', reward: 5000 },
        { id: 'waves5', desc: 'Пройти 5 волн в TD', target: 5, type: 'wave', reward: 5000 },
        { id: 'buy1', desc: 'Купить 1 предмет', target: 1, type: 'buy', reward: 5000 },
        { id: 'repair1', desc: 'Починить 1 оружие', target: 1, type: 'repair', reward: 5000 }
    ];

    function refreshDailyTasks() {
        const now = Date.now();
        if (now - player.lastDailyReset > 86400000 || !player.dailyTasks || player.dailyTasks.length === 0) {
            player.dailyTasks = DAILY_TASKS.map(t => ({
                id: t.id, desc: t.desc, target: t.target, progress: 0, completed: false, type: t.type, reward: t.reward
            }));
            player.lastDailyReset = now;            savePlayer();
        }
    }
    refreshDailyTasks();

    function updateDailyProgress(type, amount = 1) {
        player.dailyTasks.forEach(t => {
            if (!t.completed && t.type === type) {
                t.progress = Math.min(t.target, t.progress + amount);
                if (t.progress >= t.target) t.completed = true;
            }
        });
        savePlayer();
    }

    function claimDailyReward() {
        const allCompleted = player.dailyTasks.every(t => t.completed);
        if (allCompleted) {
            player.money += 5000;
            player.dailyTasks = DAILY_TASKS.map(t => ({
                id: t.id, desc: t.desc, target: t.target, progress: 0, completed: false, type: t.type, reward: t.reward
            }));
            player.lastDailyReset = Date.now();
            savePlayer();
            alert('✅ Вы получили 5000 монет! Новые задания выданы.');
            return true;
        } else {

        function generateWave(wave) {
            let z = [];
            if (wave < 13) {
                const patterns = [
                    [{ type: 'Зомби-страх', cnt: 10 }],
                    [{ type: 'Зомби-страх', cnt: 5 }, { type: 'Зомби-силач', cnt: 5 }],
                    [{ type: 'Зомби-страх', cnt: 1 }, { type: 'Зомби-силач', cnt: 10 }],
                    [{ type: 'Зомби-страх', cnt: 25 }],
                    [{ type: 'Зомби-хакер', cnt: 10 }],
                    [{ type: 'Зомби-хакер', cnt: 15 }],
                    [{ type: 'Зомби-невидимка', cnt: 1 }, { type: 'Зомби-хакер', cnt: 20 }],
                    [{ type: 'Зомби-невидимка', cnt: 5 }, { type: 'Зомби-хакер', cnt: 5 }],
                    [{ type: 'Зомби-хакер', cnt: 15 }, { type: 'Зомби-невидимка', cnt: 10 }],
                    [{ type: 'Зомби-невидимка', cnt: 15 }],
                    [{ type: 'Зомби-невидимка', cnt: 5 }, { type: 'Зомби-прыгун', cnt: 10 }],
                    [{ type: 'Зомби-прыгун', cnt: 5 }],
                    [{ type: 'Зомби-прыгун', cnt: 15 }]
                ];
                const pat = patterns[wave] || patterns[12];
                pat.forEach(p => {
                    const zt = ZOMBIES.find(z => z.name === p.type);
                    for (let i = 0; i < p.cnt; i++) z.push({ ...zt, curHp: zt.hp });
                });
            } else if (wave < 35) {
                let cnt = 15 + (wave - 13) * 3;
                for (let i = 0; i < cnt; i++) z.push({ ...ZOMBIES[4], curHp: ZOMBIES[4].hp });
            } else if (wave < 100) {
                let cnt = 1 + (wave - 35);
                for (let i = 0; i < cnt; i++) z.push({ ...ZOMBIES[5], curHp: ZOMBIES[5].hp });
            } else if (wave < 900) {
                for (let i = 0; i < 30; i++) {                    const r = Math.floor(Math.random() * 3);
                    let type = r === 0 ? ZOMBIES[3] : r === 1 ? ZOMBIES[4] : ZOMBIES[5];
                    z.push({ ...type, curHp: type.hp });
                }
            } else {
                let cnt = 1 + (wave - 900);
                for (let i = 0; i < cnt; i++) z.push({ ...ZOMBIES[6], curHp: ZOMBIES[6].hp });
            }
            return z;
        }

        function renderBattle() {

        function renderSimple() {

            const wd = WEAPONS.find(w => w.name === battle.selWeapon) || (battle.selWeapon === 'Молот тестера' ? TESTER_HAMMER : null);
            if (!wd) return;

                const displayName = player.renamedWeapons[name] || name;

        function handleSwipe(weapons) {
            if (weapons.length === 0) return;
            let currentIndex = weapons.indexOf(battle.selWeapon);
            if (currentIndex === -1) currentIndex = 0;
            if (touchEndX < touchStartX - 50) {
                currentIndex = (currentIndex + 1) % weapons.length;
                battle.selWeapon = weapons[currentIndex];
                renderBattle();
            } else if (touchEndX > touchStartX + 50) {
                currentIndex = (currentIndex - 1 + weapons.length) % weapons.length;
                battle.selWeapon = weapons[currentIndex];
                renderBattle();
            }
        }

                    battle.baseHp -= zombie.dmg;

                    renderTower();
                    if (battle.baseHp > 0) scheduleZombieAttack(zombie);

            if (zombie._timer) { clearTimeout(zombie._timer); zombie._timer = null; }

                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                } else if (document.documentElement.webkitRequestFullscreen) {
                    document.documentElement.webkitRequestFullscreen();
                }
            });
        }

        // ========== СМЕНА ИМЕНИ И АВАТАРА ==========
        el.avatars.forEach(opt => {
            opt.addEventListener('click', () => {
                player.avatar = opt.dataset.avatar;
                savePlayer();
                if (el.profileAvatar) el.profileAvatar.textContent = player.avatar;
                renderProfile();
            });
        });
        if (el.changeName) {
            el.changeName.addEventListener('click', () => {
                const n = el.newName.value.trim();
                if (n) { player.name = n; savePlayer(); updateUI(); renderProfile(); el.newName.value = ''; }
            });
        }

        // ========== ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ==========
        el.tabs.forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab));
        });

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        renderShop();
        renderLimited();
        renderInventory();
        renderUnits();
        renderProfile();
        updateUI();
    }

    // ========== АДМИН-ПАНЕЛЬ ==========
    function renderAdmin() {
        adminDiv.innerHTML = `
            <div id="top-bar"><span>🔧 Админ-панель</span><button id="back-to-game">Вернуться в игру</button></div>
            <div id="screen" style="padding:16px;">
                <div class="glass-panel">
                    <h3>Список всех игроков</h3>
                    <div id="all-players-list" style="max-height:200px; overflow-y:auto;"></div>
                </div>
                <div class="glass-panel">
                    <h3>Управление игроком</h3>
                    <div class="admin-row">
                        <input type="text" id="admin-id" placeholder="ID игрока" class="trade-input">
                        <button id="load-stats">Загрузить</button>
                    </div>
                    <div id="admin-stats" class="message-box"></div>
                    <div class="admin-row">
                        <button id="ban-user">⛔ Бан</button>
                        <button id="unban-user">✅ Разбан</button>
                    </div>
                    <div class="admin-row">
                        <input type="number" id="give-zombie" placeholder="Zombie Coins" class="trade-input">
                        <button id="give-zombie-btn">Выдать</button>
                    </div>
                    <div class="admin-row">
                        <input type="number" id="give-rainbow" placeholder="Rainbow Coins" class="trade-input">
                        <button id="give-rainbow-btn">Выдать</button>
                    </div>
                    <div class="admin-row">                        <button id="make-tester">👑 Сделать тестером</button>
                        <button id="remove-tester">❌ Снять тестера</button>
                    </div>
                    <div class="admin-row">
                        <input type="text" id="give-weapon" placeholder="Название оружия" class="trade-input">
                        <button id="give-weapon-btn">Выдать оружие</button>
                    </div>
                    <div class="admin-row">
                        <input type="text" id="give-skin" placeholder="Для какого оружия скин" class="trade-input">
                        <button id="give-skin-btn">Выдать скин</button>
                    </div>
                    <div class="admin-row">
                        <button id="reset-player">🔄 Сброс игрока</button>
                    </div>
                </div>
            </div>
        `;

        const backBtn = document.getElementById('back-to-game');
        backBtn.addEventListener('click', () => {
            window.location.href = window.location.pathname;
        });

        const allPlayersDiv = document.getElementById('all-players-list');
        function refreshPlayerList() {
            allPlayersDiv.innerHTML = '';
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                try {
                    const data = JSON.parse(localStorage.getItem(key));
                    if (data && data.id && data.name) {
                        const div = document.createElement('div');
                        div.className = 'player-list-item';
                        div.innerHTML = `<span>${data.name}</span><span style="font-size:0.8em;">${data.id}</span>`;
                        div.addEventListener('click', () => {
                            document.getElementById('admin-id').value = data.id;
                            setTimeout(() => document.getElementById('load-stats').click(), 50);
                        });
                        allPlayersDiv.appendChild(div);
                    }
                } catch (e) {}
            }
        }
        refreshPlayerList();

        let currentTargetId = null;
        let targetPlayer = null;

        document.getElementById('load-stats').addEventListener('click', () => {
            const targetId = document.getElementById('admin-id').value.trim();            if (!targetId) return;

            let foundKey = null;
            let foundPlayer = null;
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                try {
                    const data = JSON.parse(localStorage.getItem(key));
                    if (data && data.id === targetId) {
                        foundKey = key;
                        foundPlayer = data;
                        break;
                    }
                } catch (e) {}
            }

            if (foundPlayer) {
                currentTargetId = targetId;
                targetPlayer = foundPlayer;
                document.getElementById('admin-stats').innerHTML = 
                    `Игрок: ${foundPlayer.name}<br>Деньги: ${foundPlayer.money}<br>Rainbow: ${foundPlayer.rainbowMoney}<br>Уровень: ${foundPlayer.level}<br>Тестер: ${foundPlayer.isTester ? '✅' : '❌'}`;
            } else {
                document.getElementById('admin-stats').innerHTML = '❌ Игрок не найден';
            }
        });

        function saveTargetPlayer() {
            if (!targetPlayer || !currentTargetId) return;
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                try {
                    const data = JSON.parse(localStorage.getItem(key));
                    if (data && data.id === currentTargetId) {
                        localStorage.setItem(key, JSON.stringify(targetPlayer));
                        break;
                    }
                } catch (e) {}
            }
            refreshPlayerList();
        }

        document.getElementById('ban-user').addEventListener('click', () => {
            if (targetPlayer) {
                targetPlayer.isBanned = true;
                if (!adminData.bannedIds.includes(currentTargetId)) {
                    adminData.bannedIds.push(currentTargetId);
                    saveAdmin();
                }
                saveTargetPlayer();
                alert('Игрок забанен');            }
        });

        document.getElementById('unban-user').addEventListener('click', () => {
            if (targetPlayer) {
                targetPlayer.isBanned = false;
                adminData.bannedIds = adminData.bannedIds.filter(id => id !== currentTargetId);
                saveAdmin();
                saveTargetPlayer();
                alert('Игрок разбанен');
            }
        });

        document.getElementById('give-zombie-btn').addEventListener('click', () => {
            const amount = parseInt(document.getElementById('give-zombie').value);
            if (targetPlayer && amount > 0) {
                targetPlayer.money += amount;
                saveTargetPlayer();
                alert(`Выдано ${amount} Zombie Coins`);
            }
        });

        document.getElementById('give-rainbow-btn').addEventListener('click', () => {
            const amount = parseInt(document.getElementById('give-rainbow').value);
            if (targetPlayer && amount > 0) {
                targetPlayer.rainbowMoney += amount;
                saveTargetPlayer();
                alert(`Выдано ${amount} Rainbow Coins`);
            }
        });

        document.getElementById('make-tester').addEventListener('click', () => {
            if (targetPlayer && !adminData.testers.includes(currentTargetId)) {
                adminData.testers.push(currentTargetId);
                targetPlayer.isTester = true;
                if (!targetPlayer.weapons) targetPlayer.weapons = [];
                if (!targetPlayer.weapons.some(w => w.name === 'Молот тестера')) {
                    targetPlayer.weapons.push({ name: 'Молот тестера', durability: -1, skin: null });
                }
                saveAdmin();
                saveTargetPlayer();
                alert('Тестер добавлен');
            }
        });

        document.getElementById('remove-tester').addEventListener('click', () => {
            if (targetPlayer) {
                adminData.testers = adminData.testers.filter(id => id !== currentTargetId);
                targetPlayer.isTester = false;
                targetPlayer.weapons = targetPlayer.weapons.filter(w => w.name !== 'Молот тестера');                saveAdmin();
                saveTargetPlayer();
                alert('Тестер снят');
            }
        });

        document.getElementById('give-weapon-btn').addEventListener('click', () => {
            const weaponName = document.getElementById('give-weapon').value.trim();
            if (targetPlayer && weaponName) {
                const w = WEAPONS.find(w => w.name === weaponName) || (weaponName === 'Молот тестера' ? TESTER_HAMMER : null);
                if (w && !targetPlayer.weapons.some(wp => wp.name === weaponName)) {
                    targetPlayer.weapons.push({ name: weaponName, durability: w.maxDur, skin: null });
                    saveTargetPlayer();
                    alert(`Выдано оружие ${weaponName}`);
                } else alert('Оружие не найдено или уже есть');
            }
        });

        document.getElementById('give-skin-btn').addEventListener('click', () => {
            const weaponName = document.getElementById('give-skin').value.trim();
            if (targetPlayer && weaponName) {
                const wep = targetPlayer.weapons.find(w => w.name === weaponName);
                if (wep) {
                    wep.skin = '✨';
                    saveTargetPlayer();
                    alert(`Скин выдан для ${weaponName}`);
                } else alert('Оружие не найдено');
            }
        });

        document.getElementById('reset-player').addEventListener('click', () => {
            if (targetPlayer && confirm('Сбросить игрока?')) {
                const newPlayer = { ...DEFAULT_PLAYER, id: targetPlayer.id };
                targetPlayer = newPlayer;
                saveTargetPlayer();
                alert('Игрок сброшен');
            }
        });
    }
}
</script>
</body>
</html>
